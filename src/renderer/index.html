<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self'; font-src 'self'">
  <title>DentCloud Hardware Bridge</title>
  <link rel="stylesheet" href="../../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-brand">
        <img src="assets/logo.png" alt="DentCloud" class="header-logo">
        <div>
          <h1>DentCloud</h1>
          <span class="header-subtitle">Hardware Bridge</span>
        </div>
      </div>
      <div id="version" class="version-badge"></div>
    </header>

    <div id="update-banner" class="update-banner" style="display:none">
      <div class="update-banner-content">
        <i class="fa-solid fa-arrow-up-from-bracket"></i>
        <span id="update-message"></span>
        <div id="update-progress" class="update-progress" style="display:none">
          <div class="update-progress-bar" id="update-progress-bar"></div>
        </div>
      </div>
      <div class="update-actions">
        <button id="btn-update-download" class="btn-update" style="display:none">Download</button>
        <button id="btn-update-install" class="btn-update" style="display:none">Install &amp; Restart</button>
        <button id="btn-update-dismiss" class="btn-dismiss">&times;</button>
      </div>
    </div>

    <nav>
      <button class="tab active" data-tab="status">Dashboard</button>
      <button class="tab" data-tab="log">Event Log</button>
    </nav>

    <!-- Dashboard Panel -->
    <section id="status" class="panel active">
      <div class="status-list">

        <div class="status-row" data-service="ws">
          <span class="svc-dot connected" id="ws-dot"></span>
          <span class="svc-name">DentCloud Connection</span>
          <span class="svc-state" id="ws-status">Running</span>
          <span class="svc-detail" id="ws-detail"></span>
        </div>

        <div class="status-row" data-service="card-reader">
          <span class="svc-dot disconnected" id="card-reader-dot"></span>
          <span class="svc-name">Card Reader</span>
          <span class="svc-state" id="card-reader-status">Disconnected</span>
          <span class="svc-detail" id="card-reader-detail"></span>
        </div>

        <div class="status-row" data-service="edc">
          <span class="svc-dot disconnected" id="edc-dot"></span>
          <span class="svc-name">EDC-DentCloud Payment</span>
          <button class="svc-gear" id="btn-edc-gear" title="Configure EDC">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <span class="svc-detail" id="edc-detail"></span>
          <span class="svc-state" id="edc-status">Disconnected</span>
        </div>
        <div class="svc-settings" id="edc-settings">
          <div class="svc-settings-inner">
            <div class="inline-fields">
              <div class="field">
                <label>Quectel USB AT Port</label>
                <select id="edc-com">
                  <option value="">Select port...</option>
                </select>
              </div>
              <div class="field">
                <label>Baud Rate</label>
                <select id="edc-baud">
                  <option value="9600" selected>9600</option>
                  <option value="19200">19200</option>
                  <option value="38400">38400</option>
                </select>
              </div>
              <button class="btn-save-inline" id="btn-save-edc">Save</button>
            </div>
          </div>
        </div>

      </div>

      <label class="standalone-toggle">
        <input type="checkbox" id="chk-auto-start">
        <span>Start on boot</span>
      </label>
    </section>

    <!-- Event Log -->
    <section id="log" class="panel">
      <div class="panel-header">
        <h2>Event Log</h2>
        <span class="panel-hint">Up to 200 entries</span>
      </div>
      <div class="log-filter-bar">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="cardReader">Card Reader</button>
        <button class="filter-chip" data-filter="edc">EDC</button>
        <button class="filter-chip" data-filter="ws">Connection</button>
        <button class="filter-chip" data-filter="error">Error</button>
      </div>
      <div id="event-log" class="log-container"></div>
    </section>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
